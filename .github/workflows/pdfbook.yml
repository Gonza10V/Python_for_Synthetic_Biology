name: Build and release book PDF

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '_quarto.yml'
      - 'index.qmd'
      - 'preface.qmd'
      - 'roadmap.qmd'
      - 'references.qmd'
      - 'references.bib'
      - 'styles.css'
      - 'chapters/**'
      - 'requirements.txt'
      - '.github/workflows/release-pdf.yml'

permissions:
  contents: write

concurrency:
  group: pdf-release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PDF_NAME: python_for_synthetic_biology.pdf
  PDF_TAG: book_pdf

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install jupyter

      - name: Render PDF
        run: quarto render --to typst

      - name: Check PDF output
        run: |
          test -f "docs/${PDF_NAME}"
          ls -lh "docs/${PDF_NAME}"

      - name: Publish PDF to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.PDF_TAG }}
          name: Latest book PDF
          body: |
            Automated PDF build for *Python for Synthetic Biology*.

            Stable download URL:
            https://github.com/${{ github.repository }}/releases/download/${{ env.PDF_TAG }}/${{ env.PDF_NAME }}
          target_commitish: ${{ github.sha }}
          files: docs/${{ env.PDF_NAME }}
          overwrite_files: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
